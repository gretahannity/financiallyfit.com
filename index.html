<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financially Fit | Build Your Wealth</title>
    <style>
        :root {
            --bg: #f0fdf4; /* Very light mint */
            --primary: #166534; /* Deep Forest Green */
            --accent: #22c55e; /* Vibrant Success Green */
            --gold: #f59e0b; /* Coin Gold */
            --slate: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: var(--slate);
        }

        /* Flying Dollars Background */
        .money-stream {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            perspective: 1000px;
        }

        .dollar {
            position: absolute;
            font-size: 2.5rem;
            color: var(--accent);
            font-weight: bold;
            user-select: none;
            animation: fly 8s infinite linear;
            opacity: 0.8;
            text-shadow: 2px 2px 10px rgba(22, 101, 52, 0.1);
        }

        @keyframes fly {
            0% {
                transform: translateY(110vh) translateX(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-20vh) translateX(50px) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        /* Small, Modern Financial Card */
        .card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px -12px rgba(22, 101, 52, 0.12);
            text-align: center;
            max-width: 350px;
            width: 90%;
            border: 1px solid rgba(22, 101, 52, 0.1);
            animation: slideUp 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .brand {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            color: var(--primary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        h1 {
            font-size: 1.1rem;
            margin-bottom: 1.2rem;
            color: #334155;
            line-height: 1.3;
        }

        p {
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: block;
            background: var(--primary);
            color: white;
            padding: 0.8rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(22, 101, 52, 0.3);
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(22, 101, 52, 0.4);
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-val { font-weight: 700; color: var(--primary); font-size: 1rem; }
        .stat-lbl { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }

    </style>
</head>
<body>

    <div class="money-stream">
        <div class="dollar" style="left: 10%; animation-delay: 0s;">$</div>
        <div class="dollar" style="left: 30%; animation-delay: 2s;">$</div>
        <div class="dollar" style="left: 55%; animation-delay: 4s;">$</div>
        <div class="dollar" style="left: 75%; animation-delay: 1s;">$</div>
        <div class="dollar" style="left: 90%; animation-delay: 5s;">$</div>
        <div class="dollar" style="left: 20%; animation-delay: 3s; font-size: 1.5rem;">$</div>
        <div class="dollar" style="left: 65%; animation-delay: 6s; font-size: 3rem;">$</div>
    </div>

    <div class="card">
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            FINANCIALLY FIT
        </div>
        <h1>Master your money. <br>Level up your life.</h1>
        <p>Your journey to financial independence starts with a single step. We provide the tools to get you there faster.</p>
        
        <a href="#" class="btn">Start Your Growth</a>

        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-val">2026</span>
                <span class="stat-lbl">Global Reach</span>
            </div>
            <div class="stat-item">
                <span class="stat-val">100%</span>
                <span class="stat-lbl">Secure</span>
            </div>
        </div>
    </div>

</body>
</html>
